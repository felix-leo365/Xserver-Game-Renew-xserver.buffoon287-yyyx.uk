name: XServer Renew (Selenium)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 */2 * *"   # 每天自动执行

jobs:
  run_script:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # ⚠️ 关键：安装 selenium-wire 和 blinker 1.4
        pip install selenium selenium-wire blinker==1.4 requests

    - name: Run Script
      env:
        # 如果需要覆盖默认配置，在这里添加 Secrets
        # XSERVER_EMAIL: ${{ secrets.EMAIL }}
        # XSERVER_PASSWORD: ${{ secrets.PASSWORD }}
        USE_HEADLESS: 'true'
      run: python main.py
      
    - name: Commit & Push README
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto update README [skip ci]"
        file_pattern: README.md
